<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>syrchat - منصة الدردشة</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="styles/lobby.css">
    <link rel="stylesheet" href="styles/chat.css">
    <link rel="stylesheet" href="styles/topbar.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay active">
        <div class="modal-box">
            <div class="modal-header">🎬 syrchat - تسجيل الدخول</div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input id="email" class="form-control" type="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input id="password" class="form-control" type="password" placeholder="••••••••">
            </div>
            <div id="auth-fields" style="display:none;">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input id="username" class="form-control" type="text" placeholder="اسمك في المنصة">
                </div>
                <div class="form-group">
                    <label>الجنس</label>
                    <select id="gender" class="form-control">
                        <option value="male">ذكر</option>
                        <option value="female">أنثى</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button id="btn-login" class="btn-primary" style="flex:1;">دخول</button>
                <button id="btn-register" class="btn-primary success" style="flex:1;">إنشاء حساب</button>
            </div>
            <div id="auth-error" class="error-msg"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container">
        <!-- Lobby -->
        <div id="lobby-screen" class="active">
            <div id="sidebar">
                <div class="lobby-title">🌐 الغرف العامة</div>
                <div class="room-list" id="public-rooms"></div>
                <button id="btn-create-room" class="btn-primary" style="width:100%; margin-top:12px;">+ إنشاء غرفة</button>
                <div id="notification-area"></div>
            </div>
            <div id="main-lobby">
                <div class="lobby-title">مرحباً بك في صالة syrchat 🎉</div>
                <div class="lobby-welcome" id="welcome-msg">اختر غرفة للبدء</div>
                <div id="lobby-content"></div>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen">
            <div id="topbar-wrapper">
                <div id="topbar-handle"></div>
                <div id="topbar">
                    <div id="ticker-bar">
                        <span id="ticker-text">🎯 syrchat - منصة دردشة اجتماعية آمنة وممتعة</span>
                    </div>
                    <div class="topbar-buttons">
                        <button class="topbar-btn" id="btn-rooms-panel">🏠 غرف</button>
                        <button class="topbar-btn" id="btn-contacts-panel">👥 جهات</button>
                        <button class="topbar-btn" id="btn-wallet-panel">💰 محفظة</button>
                        <button class="topbar-btn" id="btn-settings-panel">⚙️ إعدادات</button>
                        <button class="topbar-btn" id="btn-profile-panel">👤 ملف</button>
                    </div>
                </div>
            </div>

            <div id="chat-header">
                <div id="chat-header-title">الغرفة العامة</div>
                <div style="display:flex; gap:8px;">
                    <button id="btn-back-lobby" class="btn-primary secondary">← العودة</button>
                </div>
            </div>

            <div id="chat-messages"></div>

            <div id="chat-input-area">
                <input id="message-input" class="form-control" placeholder="اكتب رسالتك...">
                <button id="btn-send" class="btn-primary">إرسال</button>
            </div>
            <div id="msg-error"></div>
        </div>
    </div>

    <!-- Panels -->
    <div id="panel-rooms" class="panel"></div>
    <div id="panel-contacts" class="panel"></div>
    <div id="panel-wallet" class="panel"></div>
    <div id="panel-settings" class="panel"></div>
    <div id="panel-profile" class="panel"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/lobby.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module" src="js/topbar.js"></script>
    <script type="module" src="js/panels.js"></script>
</body>
</html>
